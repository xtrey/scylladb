# --- Project identity ---
sonar.projectKey=scylladb
sonar.projectName=ScyllaDB
# NOTE: no sonar.projectBaseDir here. Inside the sonar-scanner-cli container the
# sources are mounted at /usr/src; the scanner defaults the base dir to that
# working directory. A host path here would not exist in the container.
sonar.sourceEncoding=UTF-8

# --- Local SonarQube instance (POC) ---
sonar.host.url=http://localhost:9000
sonar.token=sqa_abf21d5dd57ac825987d4dc9b0c2e2edf8f4530d

# --- SCM ---
# This checkout is a git *worktree* (.git is a file pointing into the parent
# repo). The scanner container only mounts the worktree, so JGit cannot open the
# repository and the analysis aborts. Disable SCM for the POC (no blame data).
sonar.scm.disabled=true

# --- Sources & tests ---
# Whole repo is sources; ./test is declared as test code so it is
# analyzed for quality but NEVER counted in coverage.
#sonar.sources=.
#sonar.tests=test
# ScyllaDB uses .cc/.hh (not .cpp/.h) for most C++ files; include common
# variants so sonar-cxx actually indexes the sources and attaches coverage.
sonar.cxx.file.suffixes=.cc,.hh,.h,.hpp,.cpp,.cxx,.c

# --- Exclude from MAIN analysis (submodules, build output, and the
#     test dir so the main/test file sets stay disjoint) ---
sonar.exclusions=\
  seastar/**,\
  abseil/**,\
  swagger-ui/**,\
  tools/python3/**,\
  tools/cqlsh/**,\
  scripts/**,\
  tools/**,\
  dist/**,\
  kmip/**,\
  kmipc/**,\
  build/**,\
  testlog/**,\
  test/**,\
  docs/**,\
  **/*.profraw,\
  **/*.profdata,\
  scylla-gdb.py,\
  configure.py,\
  idl-compiler.py,\
  test.py,\
  fix_system_distributed_tables.py,\
  pgo/pgo.py,\
  gen_segmented_compress_params.py

# --- Belt-and-suspenders: keep submodules/build out of coverage too ---
sonar.coverage.exclusions=\
  seastar/**,\
  abseil/**,\
  swagger-ui/**,\
  tools/python3/**,\
  tools/cqlsh/**,\
  kmip/**,\
  kmipc/**,\
  build/**,\
  testlog/**,\
  test/**,\
  docs/**,\
  **/*.profraw,\
  **/*.profdata

# --- Coverage report import (sonar-cxx plugin) ---
# C/C++ coverage via the sonar-cxx plugin. The only practical coverage importer
# for LLVM source-based coverage is Cobertura XML. The report is generated by
# scripts/sonar-coverage.sh (raw .profraw -> .profdata -> lcov -> Cobertura).
sonar.cxx.cobertura.reportPaths=build/coverage/sonar/coverage.cobertura.xml
#
# Note: files under sonar.exclusions (seastar/abseil/build/test/...) are not
# indexed, so any coverage they carry in the report is simply ignored by Sonar.
#
# --- External C++ issue reports ---
# The assigned CXX quality profile enables only high-severity native/imported
# C++ rules. Keep these report paths enabled when you want clang-tidy/cppcheck
# findings in SonarQube; override them to empty on the scanner command line for
# a native-sonar-only run.
sonar.cxx.clangtidy.reportPaths=build/coverage/sonar/clang-tidy.txt
sonar.cxx.cppcheck.reportPaths=build/coverage/sonar/cppcheck.xml
# sonar.cxx.gcc.reportPaths=build/coverage/gcc-warnings.log
#
# Python coverage (if/when added): sonar.python.coverage.reportPaths=coverage.xml
